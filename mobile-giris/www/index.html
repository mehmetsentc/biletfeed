<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BiletFeed Giriş</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 1rem;
    }
    .icon { font-size: 3rem; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #71717a; font-size: 0.9rem; }
    button {
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      background: #f97316;
      color: #fff;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📶</div>
  <h1>Bağlantı kurulamadı</h1>
  <p>İnternet bağlantınızı kontrol edip tekrar deneyin.</p>
  <button onclick="window.location.reload()">Yenile</button>
</body>
</html>
